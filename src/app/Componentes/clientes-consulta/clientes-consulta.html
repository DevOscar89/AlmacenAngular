<mat-card class="cliente-card">
  <mat-card-header>
    <mat-card-title>Consulta Clientes</mat-card-title>
  </mat-card-header>
    <mat-card-content>
    <form  class="form-grid">      
      <!-- Tipo y Número de Documento -->
      <div class="row-flex">
          <mat-form-field appearance="outline">
          <mat-label>Número Documento</mat-label>
          <input matInput>
          <mat-icon matSuffix>numbers</mat-icon>
        </mat-form-field>
      </div>
      <div class="actions">       
         <button matButton="tonal"  type="submit"><mat-icon>search</mat-icon>Consultar</button>
         <button matButton="tonal" type="button"><mat-icon>cleaning_services</mat-icon> Limpiar</button>
         <button matButton="tonal" type="button"><mat-icon>download</mat-icon> Descargar</button>
      </div>
 </form>
  </mat-card-content>
</mat-card>
<mat-card class="cliente-card">
    @defer (on immediate) {            
                <ag-grid-angular
                 style="width: 100%; height:800px;"
                 [theme]="theme"
                 [columnDefs]="columnDefs"
                 [rowData]="rowData()"
                 [pagination]="true"
                 [rowSelection]="rowSelection"                         
                 [paginationPageSizeSelector]="[5,10, 20, 50]"   
                  (selectionChanged)="onSeelectionChanged($event)"                    
                  >
                </ag-grid-angular>
         }  @if (ClienteSeleccionado()) {
               <div class="alert alert-warning">     
                    <label>Nombre : <strong>{{ ClienteSeleccionado()?.PrimerNombre }} </strong></label>
                    <label>Apellido :<strong>{{ ClienteSeleccionado()?.PrimerApellido }} </strong></label>             
               </div>
        }
</mat-card>
