<mat-card class="cliente-card">
  <mat-card-header>
    <mat-card-title>Login</mat-card-title>
    <mat-card-subtitle>Debe estar registrado.</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form action="" class="form-grid">
        <mat-form-field appearance="outline">
            <mat-label>Usuario  :</mat-label>
            <input matInput type="text">
            <mat-icon matSuffix>person_outloand</mat-icon>
        </mat-form-field>        

        <mat-form-field appearance="outline">
            <mat-label>Contraseña  :</mat-label>
            <input matInput type="password">
            <mat-icon matSuffix>key</mat-icon>
        </mat-form-field>
         
    </form>     
     <div class="actions">
       <button matButton="tonal"  type="submit"><mat-icon>check</mat-icon>Login</button>
      </div>     
  </mat-card-content>
  </mat-card>
