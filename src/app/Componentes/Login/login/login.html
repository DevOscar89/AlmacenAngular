<div class="login-page">
  <div class="login-container">
    
    <!-- Lado Izquierdo: Imagen -->
    <div class="image-section">
      <div class="overlay">
        <h1>Almacen</h1>
        <p>Gestiona tus productos y ventas.</p>
      </div>
    </div>

    <!-- Lado Derecho: Formulario -->
    <div class="form-section">
      <mat-card class="cliente-card">
        <mat-card-header>
          <mat-card-title>Login</mat-card-title>
          <mat-card-subtitle>Debe estar registrado.</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
          <form class="form-grid">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Usuario</mat-label>
              <input matInput type="text">
              <mat-icon matSuffix>person</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Contraseña</mat-label>
              <input matInput type="password">
              <mat-icon matSuffix>key</mat-icon>
            </mat-form-field>

            <div class="actions">
              <button mat-flat-button color="primary" type="submit" class="btn-block">
                <mat-icon>check</mat-icon> Login
              </button>
            </div>
          </form>
        </mat-card-content>
      </mat-card>
    </div>

  </div>
</div>
