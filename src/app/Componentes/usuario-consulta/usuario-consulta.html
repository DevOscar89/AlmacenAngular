<div class="container">
    <div class="row">
         <div class="col-md-12 mb-3">
            <h3 class="form-label text-center">Consulta Usuarios</h3>
         </div>  
         <div class="row">
<div class="form-group col-md-6">
            <label class="form-label form-label-sm">Usuario :</label>
            <input  type="text" 
                    class="form-control form-control-sm"
                    name="Usuario" 
                    id="Usuario"/>
         </div> 
         <div class="form-group col-md-6">
           <label class="form-label form-label-sm">Rol</label>
           <input type="text" class="form-control form-control-sm" Id="Rol">
         </div>   
         </div>
           
         
         <div class="col-md-12">
              <button type="button" class="btn btn-primary mt-2">Buscar</button>
         </div>
         <div class="col-md-12 mt-3">
               @defer (on immediate) {
                    <ag-grid-angular
                         style="width: 100%; height: 400px;"
                         [theme]="theme"
                         [columnDefs]="columnDefs"
                         [rowData]="rowData()"
                         [pagination]="true"
                         [rowSelection]="rowSelection"                         
                         [paginationPageSizeSelector]="[5,10, 20, 50]"
                         (selectionChanged)="onSeelectionChanged($event)" 
                          >
                    </ag-grid-angular>
               } @placeholder {
                    }
         </div>
         <div class="col-md-12">
             @if (usuarioSeleccionado()) {
               <div class="alert alert-warning">
                    <label>Usuario : <strong>{{ usuarioSeleccionado()?.Usuario }} </strong> </label>
                    <label>Nombre : <strong>{{ usuarioSeleccionado()?.PrimerNombre }} </strong></label>
                    <label>Apellido :<strong>{{ usuarioSeleccionado()?.PrimerApellido }} </strong></label>             
               </div>
               }
         </div>
    </div>
</div>
