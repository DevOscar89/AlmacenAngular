<mat-card class="cliente-card">
     <mat-card-header>
          <mat-card-title>Consulta de Usuarios</mat-card-title>
     </mat-card-header>
     <mat-card-content>
          <form  class="form-grid">
               <div class="row-flex">
                 <mat-form-field appearance="outline">
                 <mat-label>Usuario  :</mat-label>
                 <input matInput>
                 <mat-icon matSuffix>person_search</mat-icon>
                 <mat-hint>Usuario registrado a consultar</mat-hint>
                 </mat-form-field>

                 <mat-form-field appearance="outline" color="accent">
                 <mat-label>Rol  :</mat-label>
                 <input matInput>
                 <mat-icon matSuffix>manage_search</mat-icon>
                 <mat-hint>Rol que tiene el usuario</mat-hint>
                 </mat-form-field>
               </div>
               
               <div class="row-flex">  
                 <mat-form-field appearance="outline">
                 <mat-label>Fecha inicial</mat-label>
                 <input matInput [matDatepicker]="picker">
                 <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                 <mat-datepicker #picker></mat-datepicker>
                 <mat-hint>Fecha de inicio</mat-hint>
                 </mat-form-field>

                 <mat-form-field appearance="outline">
                 <mat-label>Fecha final</mat-label>
                 <input matInput [matDatepicker]="picker2">
                 <mat-datepicker-toggle matIconSuffix [for]="picker2"></mat-datepicker-toggle>
                 <mat-datepicker #picker2></mat-datepicker>
                 <mat-hint>Fecha final</mat-hint>
                 </mat-form-field>
              </div>     
               <div class="actions">       
                  <button matButton="tonal"  type="submit"><mat-icon>search</mat-icon>Consultar</button>
                   <button matButton="tonal" type="button"><mat-icon>cleaning_services</mat-icon> Limpiar</button>
                   <button matButton="tonal" type="button"><mat-icon>download</mat-icon> Descargar</button>
               </div>
          </form>
             </mat-card-content>  
      </mat-card>
      <mat-card class="cliente-card">
           @defer (on immediate) {
                    <ag-grid-angular
                         style="width: 100%; height: 400px;"
                         [theme]="theme"
                         [columnDefs]="columnDefs"
                         [rowData]="rowData()"
                         [pagination]="true"
                         [rowSelection]="rowSelection"                         
                         [paginationPageSizeSelector]="[5,10, 20, 50]"
                         (selectionChanged)="onSeelectionChanged($event)" 
                          >
                    </ag-grid-angular>
               } @placeholder {
                    }
   
           @if (usuarioSeleccionado()) {
               <div class="alert alert-warning">
                    <label>Usuario : <strong>{{ usuarioSeleccionado()?.Usuario }} </strong> </label>
                    <label>Nombre : <strong>{{ usuarioSeleccionado()?.PrimerNombre }} </strong></label>
                    <label>Apellido :<strong>{{ usuarioSeleccionado()?.PrimerApellido }} </strong></label>             
               </div>
               }
     
</mat-card>
