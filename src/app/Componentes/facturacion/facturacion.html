<form class="container">
  <div class="row">
    <div class="col-md-12 mb-3">
      <h3 class="form-label text-center">Factura de venta</h3>
    </div> 
    <div class="row">
        <div class="form-group col-md-6">
            <label for="Documento">Numero Documento :</label>
            <input 
              type="text"
              class="form-control form-control-sm"
              id="Documento"
              name="Documento"
            /> 
        </div>  
        <div class="form-group col-md-6">
            <label for="Nombre">Nombre :</label>
            <input 
              type="text"
              class="form-control form-control-sm"
              id="Nombre"
              name="Nombre"
            /> 
        </div>  
    </div>
    <div class="row">
        <div class="form-group col-md-6">
            <label for="Departamento">Departamento :</label>
            <select 
              type="text"
              class="form-select form-select-sm"
              id="Departamento"
              name="Departamento"
              (change)="ChangeDepartamento($event)"
            >
              <option value="">Seleccione un departamento</option>
              @for(departamento of departamento(); track departamento.Id){
                <option [value]="departamento.Id">{{ departamento.Nombre }}</option>
              }
            </select>

        </div>  
        <div class="form-group col-md-6">
            <label for="Ciudad">Ciudad :</label>
            <select 
              type="text"
              class="form-select form-select-sm"
              id="Ciudad"
              name="Ciudad"
            >
              <option value="">Seleccione una ciudad</option>
              @for(municipio of municipio(); track municipio.Id){
                <option [value]="municipio.Id">{{ municipio.Nombre }}</option>
              }
            </select>
        </div>  
    </div>
    <div class="row">
        <div class="form-group col-md-6">
            <label for="Nofactura">Numero Factura :</label>
            <input 
              type="text"
              class="form-control form-control-sm"
              id="Nofactura"
              name="Nofactura"
            /> 
        </div>  
        <div class="form-group col-md-6">
            <label for="Descripcion">Descripcion :</label>
            <textarea 
              type="text"
              class="form-control form-control-sm"
              id="Descripcion"
              name="Descripcion"
              rows="3"
            ></textarea> 
        </div>  
    </div>
    <div class="row">
        <div class="form-group col-md-6">
            <label for="Cantidad">Cantidad :</label>
            <input 
              type="number"
              class="form-control form-control-sm"
              id="Cantidad"
              name="Cantidad"
            /> 
        </div>  
        <div class="form-group col-md-6">
            <label for="Valor">Valor :</label>
            <input 
              type="number"
              class="form-control form-control-sm"
              id="Valor"
              name="Valor"
              rows="3"
            /> 
        </div>  
    </div>
  </div>

  <div class="d-grid gap-2 mt-5">
  <button class="btn btn-outline-primary btn-sm" type="submit">Guardar</button>
  <button class="btn btn-outline-secondary btn-sm" type="button">Cancelar</button>
</div>
</form>
