<form class="container" [formGroup]="usuarioFormulario" (ngSubmit)="onSubmit()">
    <div class="row">
        <input type="hidden" formControlName="Id" value="0">
        <div class="col-md-12 mb-3">
             <h3 class="form-label text-center">Registro de Usuarios</h3>
        </div>   
        <div class="col-md-6">
            <label class="form-label form-label-sm">Primer Nombre :</label>
            <input 
                class="form-control form-control-sm" 
                type="text"
                id="PrimerNombre"
                name="PrimerNombre"
                formControlName="PrimerNombre"
            />
        </div>  

          <div class="col-md-6">
            <label class="form-label form-label-sm">Segundo Nombre :</label>
            <input 
                class="form-control  form-control-sm" 
                type="text"
                 id="SegundoNombre"
                name="SegundoNombre"
                formControlName="SegundoNombre"
                />
        </div>  

          <div class="col-md-6">
            <label class="form-label form-label-sm">Primer Apellido :</label>
            <input 
                class="form-control  form-control-sm" 
                type="text" 
                id="PrimerApellido"
                name="PrimerApellido"
                formControlName="PrimerApellido"
            />
        </div> 
        
         <div class="col-md-6">
            <label class="form-label form-label-sm">Segundo Apellido :</label>
            <input 
                class="form-control  form-control-sm"  
                type="text"
                id="SegundoApellido"
                name="SegundoApellido"
                formControlName="SegundoApellido"
                />
        </div>  

        <div class="col-md-12">
            <label class="form-label form-label-sm">Usuario :</label>
            <input 
                class="form-control  form-control-sm" 
                type="text" 
                id="Usuario"
                name="Usuario"
                formControlName="Usuario"
            />
            @if (usuarioFormulario.get('Usuario')?.invalid){
                <div>
                    @if(usuarioFormulario.get('usuario')?.errors?.['required']){
                        <small class="text-primary">
                        Este campo es obligatorio.
                        </small>
                    }
                </div>
            }
        </div>  

        <div class="col-md-12">
            <label class="form-label form-label-sm">Contraseña :</label>
               <input 
                    class="form-control  form-control-sm" 
                    type="password" 
                    id="Password"
                    name="Password"
                    formControlName="Password"
               />
        </div> 

        
        <div class="col-md-12">
            <label class="form-label form-label-sm">Correo :</label>
            <input 
                class="form-control  form-control-sm" 
                type="text" 
                id="Correo"
                name="Correo"
                formControlName="Correo"
            />
        </div>  

        
        <div class="col-md-12">
            <label class="form-label form-label-sm">Celular :</label>
            <input 
                class="form-control  form-control-sm" 
                type="text" 
                id="Celular"
                name="Celular"
                formControlName="Celular"
            />
        </div>  
        <div class="col-md-12">
            <label for="Rol" class="form-label">Rol :</label>
             <small class="form-text fw-light ">
                        (*) 
              </small>   
            <select 
              type="text"
              id="CodTipoDocumento"
              class="form-select form-select-sm"
              name="Rol"
              formControlName="Rol"
              >
              <option selected value="">Seleccione rol...</option>
              @for(roles of Roles(); track roles.Id){
              <option [value]="roles.Codigo">{{ roles.Rol }}</option>           
              }      
            </select> 
        </div>
    </div>  
    <div class="d-grid gap-2 mt-5">
       <button class="btn btn-primary btn-sm" type="submit">Registrar</button>
       <button class="btn btn-secondary btn-sm" type="button" (click)="onCancel()" >Cancelar</button>
    </div>    
</form>
